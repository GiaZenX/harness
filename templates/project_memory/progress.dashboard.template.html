<!DOCTYPE html>
<!--
  progress.dashboard.template.html - SHELL owned by: PM (generated artifact source)

  This is the static shell for a project's user-facing dashboard. It is NEVER
  edited by hand for data. The generator (generate_dashboard.py) reads the
  project_memory YAML files, then renders progress.dashboard.html by replacing
  ONLY the embedded JSON block below (id="dashboard-data").

  Design rules: diagram-heavy, little text, NO external dependencies
  (no CDN, no fonts, no network) so the generated file renders offline and
  leaks nothing. Bars are expandable (native <details>) to reveal the items
  behind each status, including owner, origin and start/end dates.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project Progress</title>
<style>
  :root {
    --bg: #0f1320;
    --panel: #181d2e;
    --panel-2: #1f2540;
    --text: #e7eaf3;
    --muted: #9aa3bd;
    --line: #2a3150;
    --todo: #6b7280;
    --progress: #f5a623;
    --done: #3b82f6;
    --tested: #14b8a6;
    --good: #22c55e;
    --bad: #ef4444;
    --accent: #8b5cf6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px clamp(16px, 4vw, 56px);
  }
  header { margin-bottom: 28px; }
  h1 { margin: 0 0 6px; font-size: 1.6rem; letter-spacing: .2px; }
  .status { color: var(--muted); font-size: .95rem; }
  .status strong { color: var(--text); }
  .meta { margin-top: 8px; font-size: .8rem; color: var(--muted); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .kpi .num { font-size: 2.1rem; font-weight: 700; line-height: 1; }
  .kpi .label { color: var(--muted); font-size: .82rem; margin-top: 8px; text-transform: uppercase; letter-spacing: .6px; }

  .panels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
  }
  .panel h2 { margin: 0 0 16px; font-size: 1.02rem; font-weight: 600; }

  .donut-wrap { display: flex; align-items: center; gap: 22px; }
  .donut { width: 132px; height: 132px; flex: 0 0 auto; }
  .donut .track-ring { stroke: var(--panel-2); }
  .donut .value-ring { stroke: var(--good); }
  .donut text { fill: var(--text); }
  .legend { font-size: .85rem; color: var(--muted); }
  .legend li { margin: 6px 0; list-style: none; display: flex; align-items: center; gap: 8px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .legend strong { color: var(--text); }
  ul { padding: 0; margin: 0; }

  /* Expandable bar rows (native <details>) */
  .row { border-top: 1px solid var(--line); }
  .row:first-child { border-top: none; }
  .row > summary {
    list-style: none;
    cursor: pointer;
    display: grid;
    grid-template-columns: 16px 120px 1fr 44px;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    outline: none;
  }
  .row > summary::-webkit-details-marker { display: none; }
  .row .caret { color: var(--muted); font-size: .7rem; transition: transform .2s ease; transform: rotate(0deg); }
  .row[open] .caret { transform: rotate(90deg); }
  .row .name { color: var(--muted); font-size: .85rem; }
  .row .track { background: var(--panel-2); border-radius: 999px; height: 12px; overflow: hidden; }
  .row .fill { height: 100%; border-radius: 999px; transition: width .4s ease; min-width: 2px; }
  .row .val { text-align: right; font-variant-numeric: tabular-nums; font-size: .9rem; }
  .row[aria-disabled="true"] > summary { cursor: default; }

  .items { margin: 2px 0 12px 26px; padding-left: 14px; border-left: 1px dashed var(--line); }
  .items li { list-style: none; margin: 8px 0; font-size: .82rem; }
  .items .id { font-weight: 600; color: var(--text); }
  .items .title { color: var(--text); }
  .items .metaline { color: var(--muted); margin-top: 2px; display: block; }
  .items .empty { color: var(--muted); font-style: italic; }

  /* Changes since last run */
  .changes-panel { margin-bottom: 16px; }
  .changes { display: flex; flex-direction: column; gap: 8px; }
  .change { display: flex; align-items: center; gap: 10px; font-size: .85rem; }
  .badge {
    font-size: .68rem; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 999px; flex: 0 0 auto;
  }
  .badge.new { background: rgba(34,197,94,.16); color: var(--good); }
  .badge.changed { background: rgba(245,166,35,.16); color: var(--progress); }
  .change .id { font-weight: 600; }
  .change .arrow { color: var(--muted); }
  .change .ttl { color: var(--muted); }
  .changes .none { color: var(--muted); font-style: italic; font-size: .85rem; }

  footer { margin-top: 28px; color: var(--muted); font-size: .75rem; }
</style>
</head>
<body>
<header>
  <h1>Project Progress</h1>
  <div class="status">Status: <strong id="status">&mdash;</strong></div>
  <div class="meta">Last update: <span id="last-update">&mdash;</span> &middot; generated by <code>generate_dashboard.py</code></div>
</header>

<section class="grid" id="kpis"></section>

<section class="panel changes-panel">
  <h2>Changes since last run</h2>
  <div class="changes" id="changes"></div>
</section>

<section class="panels">
  <div class="panel">
    <h2>Task completion</h2>
    <div class="donut-wrap">
      <svg class="donut" viewBox="0 0 42 42" role="img" aria-label="Task completion">
        <circle class="track-ring" cx="21" cy="21" r="15.9155" fill="none" stroke-width="4"></circle>
        <circle id="donut-fill" class="value-ring" cx="21" cy="21" r="15.9155" fill="none"
                stroke-width="4" stroke-dasharray="0 100" stroke-linecap="round"
                transform="rotate(-90 21 21)"></circle>
        <text id="donut-text" x="21" y="22.5" text-anchor="middle" font-size="7"
              font-weight="700">0%</text>
      </svg>
      <ul class="legend" id="task-legend"></ul>
    </div>
  </div>

  <div class="panel">
    <h2>Requirements</h2>
    <div id="req-bars"></div>
  </div>

  <div class="panel">
    <h2>Tasks</h2>
    <div id="task-bars"></div>
  </div>

  <div class="panel">
    <h2>Change requests</h2>
    <div id="cr-bars"></div>
  </div>
</section>

<footer>Self-contained dashboard &middot; no external resources &middot; generated from the project_memory YAML files. Do not edit by hand.</footer>

<!--
  Single source of truth. The generator replaces this whole block.
  Shape:
    status, last_update: header text
    requirements/tasks/change_requests: { order: [..status keys..],
      items: [ { id, title, status, owner?, origin?, start?, end? } ] }
    changes: [ { kind: "new"|"changed", id, title, from?, to } ]
-->
<script type="application/json" id="dashboard-data">
{
  "status": "",
  "last_update": "",
  "requirements": { "order": ["proposed", "approved", "done", "tested", "accepted", "rejected"], "items": [] },
  "tasks": { "order": ["todo", "in_progress", "done", "validated", "rejected"], "items": [] },
  "change_requests": { "order": ["open", "applied", "rejected"], "items": [] },
  "changes": []
}
</script>

<script>
  (function () {
    "use strict";
    var data;
    try {
      data = JSON.parse(document.getElementById("dashboard-data").textContent);
    } catch (e) {
      data = null;
    }
    if (!data) {
      data = { status: "", last_update: "",
        requirements: { order: [], items: [] },
        tasks: { order: [], items: [] },
        change_requests: { order: [], items: [] },
        changes: [] };
    }

    var COLORS = {
      proposed: "var(--todo)", approved: "var(--progress)", done: "var(--done)",
      tested: "var(--tested)", accepted: "var(--good)", rejected: "var(--bad)",
      todo: "var(--todo)", in_progress: "var(--progress)", validated: "var(--good)",
      open: "var(--progress)", applied: "var(--good)"
    };
    var LABELS = {
      proposed: "Proposed", approved: "Approved", done: "Done", tested: "Tested",
      accepted: "Accepted", rejected: "Rejected", todo: "To do", in_progress: "In progress",
      validated: "Validated", open: "Open", applied: "Applied"
    };

    function countByStatus(section, key) {
      var n = 0, items = (section && section.items) || [];
      for (var i = 0; i < items.length; i++) {
        if (items[i].status === key) { n++; }
      }
      return n;
    }

    function itemsByStatus(section, key) {
      var out = [], items = (section && section.items) || [];
      for (var i = 0; i < items.length; i++) {
        if (items[i].status === key) { out.push(items[i]); }
      }
      return out;
    }

    function totalItems(section) {
      return ((section && section.items) || []).length;
    }

    function setText(id, value) {
      var el = document.getElementById(id);
      if (el) { el.textContent = value; }
    }

    function metaLine(item) {
      var parts = [];
      if (item.owner) { parts.push(item.owner); }
      if (item.origin) { parts.push("from " + item.origin); }
      if (item.start || item.end) {
        parts.push("(" + (item.start || "\u2026") + " \u2192 " + (item.end || "\u2026") + ")");
      }
      return parts.join("  \u00b7  ");
    }

    function renderBars(containerId, section) {
      var container = document.getElementById(containerId);
      if (!container) { return; }
      container.textContent = "";
      var order = (section && section.order) || [];
      var counts = {};
      var max = 0;
      order.forEach(function (key) {
        counts[key] = countByStatus(section, key);
        if (counts[key] > max) { max = counts[key]; }
      });
      if (max === 0) { max = 1; }

      order.forEach(function (key) {
        var count = counts[key];
        var row = document.createElement("details");
        row.className = "row";
        if (count === 0) { row.setAttribute("aria-disabled", "true"); }

        var summary = document.createElement("summary");

        var caret = document.createElement("span");
        caret.className = "caret";
        caret.textContent = count === 0 ? "" : "\u25B6";

        var name = document.createElement("span");
        name.className = "name";
        name.textContent = LABELS[key] || key;

        var track = document.createElement("div");
        track.className = "track";
        var fill = document.createElement("div");
        fill.className = "fill";
        fill.style.width = ((count / max) * 100) + "%";
        fill.style.background = COLORS[key] || "var(--accent)";
        track.appendChild(fill);

        var val = document.createElement("span");
        val.className = "val";
        val.textContent = count;

        summary.appendChild(caret);
        summary.appendChild(name);
        summary.appendChild(track);
        summary.appendChild(val);
        row.appendChild(summary);

        if (count > 0) {
          var list = document.createElement("ul");
          list.className = "items";
          itemsByStatus(section, key).forEach(function (item) {
            var li = document.createElement("li");
            var line = document.createElement("div");
            var id = document.createElement("span");
            id.className = "id";
            id.textContent = item.id || "";
            var ttl = document.createElement("span");
            ttl.className = "title";
            ttl.textContent = item.title ? "  \u2014  " + item.title : "";
            line.appendChild(id);
            line.appendChild(ttl);
            li.appendChild(line);
            var ml = metaLine(item);
            if (ml) {
              var meta = document.createElement("span");
              meta.className = "metaline";
              meta.textContent = ml;
              li.appendChild(meta);
            }
            list.appendChild(li);
          });
          row.appendChild(list);
        } else {
          // prevent toggling empty rows
          row.addEventListener("toggle", function () { if (row.open) { row.open = false; } });
        }

        container.appendChild(row);
      });
    }

    function renderKpis() {
      var kpis = [
        { label: "Requirements", value: totalItems(data.requirements) },
        { label: "Tasks", value: totalItems(data.tasks) },
        { label: "Accepted PRDs", value: countByStatus(data.requirements, "accepted") },
        { label: "Open CRs", value: countByStatus(data.change_requests, "open") }
      ];
      var host = document.getElementById("kpis");
      host.textContent = "";
      kpis.forEach(function (k) {
        var card = document.createElement("div");
        card.className = "kpi";
        var num = document.createElement("div");
        num.className = "num";
        num.textContent = k.value;
        var label = document.createElement("div");
        label.className = "label";
        label.textContent = k.label;
        card.appendChild(num);
        card.appendChild(label);
        host.appendChild(card);
      });
    }

    function renderDonut() {
      var tasks = data.tasks || { items: [] };
      var total = totalItems(tasks);
      var done = countByStatus(tasks, "done") + countByStatus(tasks, "validated");
      var pct = total === 0 ? 0 : Math.round((done / total) * 100);
      var fill = document.getElementById("donut-fill");
      if (fill) { fill.setAttribute("stroke-dasharray", pct + " " + (100 - pct)); }
      setText("donut-text", pct + "%");

      var legendHost = document.getElementById("task-legend");
      legendHost.textContent = "";
      var order = ["todo", "in_progress", "done", "validated"];
      order.forEach(function (key) {
        var li = document.createElement("li");
        var dot = document.createElement("span");
        dot.className = "dot";
        dot.style.background = COLORS[key];
        var text = document.createElement("span");
        var strong = document.createElement("strong");
        strong.textContent = countByStatus(tasks, key);
        text.appendChild(strong);
        text.appendChild(document.createTextNode(" " + LABELS[key]));
        li.appendChild(dot);
        li.appendChild(text);
        legendHost.appendChild(li);
      });
    }

    function renderChanges() {
      var host = document.getElementById("changes");
      host.textContent = "";
      var changes = data.changes || [];
      if (changes.length === 0) {
        var none = document.createElement("div");
        none.className = "none";
        none.textContent = "No changes since the last run.";
        host.appendChild(none);
        return;
      }
      changes.forEach(function (c) {
        var row = document.createElement("div");
        row.className = "change";

        var badge = document.createElement("span");
        var kind = c.kind === "new" ? "new" : "changed";
        badge.className = "badge " + kind;
        badge.textContent = kind === "new" ? "New" : "Changed";

        var id = document.createElement("span");
        id.className = "id";
        id.textContent = c.id || "";

        row.appendChild(badge);
        row.appendChild(id);

        if (c.kind !== "new" && (c.from || c.to)) {
          var arrow = document.createElement("span");
          arrow.className = "arrow";
          arrow.textContent = (c.from || "\u2026") + " \u2192 " + (c.to || "\u2026");
          row.appendChild(arrow);
        } else if (c.to) {
          var arrow2 = document.createElement("span");
          arrow2.className = "arrow";
          arrow2.textContent = c.to;
          row.appendChild(arrow2);
        }

        if (c.title) {
          var ttl = document.createElement("span");
          ttl.className = "ttl";
          ttl.textContent = "\u2014 " + c.title;
          row.appendChild(ttl);
        }

        host.appendChild(row);
      });
    }

    setText("status", data.status ? data.status : "\u2014");
    setText("last-update", data.last_update ? data.last_update : "\u2014");
    renderKpis();
    renderChanges();
    renderDonut();
    renderBars("req-bars", data.requirements);
    renderBars("task-bars", data.tasks);
    renderBars("cr-bars", data.change_requests);
  })();
</script>
</body>
</html>
