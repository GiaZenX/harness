# business_profile.yaml — owned by: Manager
# Filled ONCE in the onboarding interview; everything else (categories, PROCs, register scope,
# report layout) derives from it. Update only with the user (it is their business).
# GIT HISTORY IS FOREVER: record only what operations truly needs. Trading name + legal form
# yes; the owner's PRIVATE address, personal tax IDs or bank details do NOT belong in a tracked
# file (a real deployment committed owner PII on day 1) — keep those in the user's own records
# and reference "see user records" here.

business:
  name: ""                    # trading name
  legal_form: ""              # e.g. Einzelunternehmen / GbR / UG / GmbH
  country: "DE"
  markets: []                 # where products/services are sold, e.g. [DE, AT, EU]
  channels: []                # e.g. [own-shop, amazon, ebay, local]
  products_services: ""       # one paragraph: what is sold
  product_categories: []      # drives the compliance register scope, e.g. [electronics, textiles]

tax:
  kleinunternehmer: null      # true/false (§ 19 UStG) — changes the whole VAT column logic
  vat_id: ""                  # USt-IdNr. if any (never a secret; still optional)
  oss: null                   # true/false — EU One-Stop-Shop registered?
  fiscal_year: "calendar"

# Privacy honesty (constitution §2.7): processing a document sends its content to the active
# provider under the USER'S account terms. The user decides knowingly what the kit may process.
privacy:
  provider: ""                # claude | codex | other (active document-processing provider)
  account_type: ""            # provider-specific account/plan, in the user's words; never assumed
  claude_account_type: ""     # LEGACY: abo | api; if set alone, read as provider=claude + this account_type
  sensitive_documents: ""     # process | redact | exclude  (the user's explicit choice)
  notes: ""

revenue_sources: []           # company-specific — WHERE income data comes from, e.g.
#   - kind: shop_export       #   [shop_export, psp_export, bank_statement, manual]
#     detail: "Shopify order export CSV, monthly"
