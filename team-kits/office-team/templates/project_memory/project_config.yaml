# project_config.yaml — owned by: Manager
# Created once at init. Preset + model map. Preset and any model change MUST be user-confirmed.
# Presets are MECHANICAL: the scaffold installs only the preset's roles (kit presets.yaml) —
# core = records-clerk + bookkeeper; commerce adds product-editor + shop-curator; full adds
# compliance-researcher + marketing-planner. Upgrading = re-run the scaffold + session restart.

project:
  name: ""                  # set at init
  preset: core              # core | commerce | full — user-confirmed

# Agent CLIs this repo is generated for: claude | codex. With codex listed, every scaffold run
# generates the Codex artifacts from the installed kit state — single source, never hand-cloned.
# BOTH by default so a mid-project CLI switch needs no config edit. Claude is the reference
# platform; Codex is BETA (one-time project trust + /hooks trust required).
providers: [claude, codex]

# Model ladder: haiku < sonnet < opus. Specialists DEFAULT to sonnet. Up-scaling needs user
# confirmation; down-scaling the manager MAY do itself but MUST report it with a reason.
# Tier aliases: `lead`/`worker`/`light` are accepted as values (= opus/sonnet/haiku on Claude);
# provider generators translate tiers to the concrete model via team-kits/model_tiers.yaml.
# The manager is the FOREGROUND agent on opus (kit settings + frontmatter) — NOT listed here.
# The scaffold re-stamps each installed agent's model:/effort: from these maps on every update;
# session_status nags on drift. Keys cover the FULL roster — entries for roles the preset did not
# install are inert until an upgrade installs them.
model_map:
  records-clerk: worker
  bookkeeper: worker
  product-editor: worker
  shop-curator: worker
  compliance-researcher: worker
  marketing-planner: worker
  office-developer: lead       # the only coding role and the kit has no QA/CI net — judgment
                               # errors in its tools go uncaught, so it gets the strong tier.
  project-auditor: worker

# Reasoning effort per specialist (low | medium | high | xhigh | max). All default high. FACTS
# (official effort doc, verified 2026-07): haiku has NO effort parameter; Sonnet 5 supports xhigh
# AND max. Escalation ladder (user-confirmed): sonnet-high -> sonnet-xhigh -> opus-high -> opus-xhigh/max.
effort_map:
  records-clerk: high
  bookkeeper: high
  product-editor: high
  shop-curator: high
  compliance-researcher: high
  marketing-planner: high
  office-developer: high
  project-auditor: high
