# Preset -> installed specialist roles (the lead/office-manager is ALWAYS installed).
# MECHANICAL: scaffold_team installs ONLY the chosen custom kit roles. Claude's spawn guard also
# blocks non-installed roles; Codex policy/self-validation does so while native built-ins remain.
# Upgrading = user OK, then larger preset + session restart. Flat format, strictly YAML-parsed:
# one preset per line, roles space-separated, `all` = all roles.
core: records-clerk bookkeeper project-auditor
commerce: records-clerk bookkeeper product-editor shop-curator project-auditor
full: all
