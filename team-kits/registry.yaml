# Team-kit registry — single source of truth for intent -> kit routing.
#
# The global entry gates (user/claude/CLAUDE.md and user/codex/AGENTS.md) read this file
# to decide which team kit to install into a repository. Adding a new team type is one entry here —
# no prose edits elsewhere.
#
# The scaffold scripts (team-kits/scaffold_team.{ps1,sh}) install a kit by its `key`:
#   scaffold_team.ps1 -Team <key> [-Preset <name>]   /   scaffold_team.sh <key> [preset]
# A kit is installable only if `status: available`.
#
# Presets are MECHANICAL: each kit ships a presets.yaml (preset -> installed specialist roles);
# with a preset only those kit roles (+ the lead) are installed. Provider-native built-ins may still
# exist (notably in Codex), but the generated team policy forbids selecting them. `presets:` below
# just NAMES them for the entry gate; the kit file is authoritative.
#
# `lead: project-manager` is the kit's SESSION agent: the kit's .claude/settings.json sets
# `agent: project-manager`, so the repo's main session IS the PM (not a spawnable subagent).
# `roles` lists the specialist SUBAGENTS the PM spawns (files under the kit's agents/).

version: 1

teams:
  - key: dev-team
    title: Development Team
    status: available
    lead: project-manager     # kit settings.json sets agent:project-manager -> the session IS the PM
    summary: >
      Software / product engineering: apps, APIs, tooling, libraries, build work.
      Runs the PRD -> SRD -> Task hierarchy: foreground PM + 7 specialist subagents.
    intents:
      - software
      - app
      - application
      - api
      - backend
      - frontend
      - website
      - tooling
      - cli
      - library
      - build
      - feature
      - bugfix
      - refactoring
    presets: [solo, duo, team]   # see team-kits/dev-team/presets.yaml (authoritative)
    roles:                     # specialist subagents (./.claude/agents/)
      - software-architect
      - product-designer
      - research-engineer
      - backend-developer
      - frontend-developer
      - quality-engineer
      - devops-engineer
      - project-auditor

  - key: research-team
    title: Research Team
    status: available
    lead: project-manager     # kit settings.json sets agent:project-manager -> the session IS the PM
    summary: >
      Research / experimentation with an FZulG (German R&D tax credit) documentation layer.
      Runs the Research-Question -> Hypothesis/Experiment -> Task hierarchy: foreground PM +
      6 specialist subagents, producing per-experiment LaTeX reports plus fundable documentation.
    intents:
      - research
      - experiment
      - experimentation
      - study
      - hypothesis
      - investigation
      - science
      - grant
      - fzulg
      - r&d
      - rnd
    presets: [solo, duo, team]   # see team-kits/research-team/presets.yaml (authoritative)
    roles:                     # specialist subagents (./.claude/agents/)
      - methodologist
      - researcher
      - data-analyst
      - reviewer
      - research-engineer
      - report-writer
      - project-auditor

  - key: office-team
    title: Office / Back-Office Team (Sachbearbeiter)
    status: available
    lead: office-manager      # kit settings.json sets agent:office-manager -> the session IS the manager
    summary: >
      Back-office automation for a small business: inbox-driven filing, bookkeeping preparation
      (append-only ledger + deterministic quarterly income/expense report), product/content care,
      compliance research register, marketing planning, and business-specific data
      tools/dashboards (read-only consumers of the tracked data). Runs the PROC (approved
      process) model: foreground manager + up to 8 specialist subagents. Drafts only — it never
      sends anything; no tax or legal advice.
    intents:
      - office
      - back-office
      - business
      - gewerbe
      - invoices
      - rechnungen
      - bookkeeping
      - buchhaltung
      - accounting
      - filing
      - ablage
      - shop
      - e-commerce
      - products
      - compliance
      - marketing
    presets: [core, commerce, full]   # see team-kits/office-team/presets.yaml (authoritative)
    roles:                     # specialist subagents (./.claude/agents/)
      - records-clerk
      - bookkeeper
      - product-editor
      - shop-curator
      - compliance-researcher
      - marketing-planner
      - office-developer
      - project-auditor

# Routing rule for the reader (the entry gate):
#   1. Classify the user's wish against each team's `intents` (substring/keyword match).
#   2. If exactly one team matches -> use it. If ambiguous -> ask ONE short routing question.
#   3. If the matched team's `status` != available -> say it is planned and offer an available one.
#   4. Default when only generic "build software" is plausible -> dev-team.
