# Team-kit registry — single source of truth for intent -> kit routing.
#
# The global entry gate (user/{claude,copilot}/CLAUDE.md / COPILOT.instructions.md) reads this file
# to decide which team kit to install into a repository. Adding a new team type is one entry here —
# no prose edits elsewhere.
#
# The scaffold scripts (team-kits/scaffold_team.{ps1,sh}) install a kit by its `key`:
#   scaffold_team.ps1 -Team <key>   /   scaffold_team.sh <key>
# A kit is installable only if `status: available`.
#
# `lead: project-manager` is the kit's SESSION agent: the kit's .claude/settings.json sets
# `agent: project-manager`, so the repo's main session IS the PM (not a spawnable subagent).
# `roles` lists the specialist SUBAGENTS the PM spawns (files under the kit's agents/).

version: 1

teams:
  - key: dev-team
    title: Development Team
    status: available
    lead: project-manager     # kit settings.json sets agent:project-manager -> the session IS the PM
    summary: >
      Software / product engineering: apps, APIs, tooling, libraries, build work.
      Runs the PRD -> SRD -> Task hierarchy: foreground PM + 7 specialist subagents.
    intents:
      - software
      - app
      - application
      - api
      - backend
      - frontend
      - website
      - tooling
      - cli
      - library
      - build
      - feature
      - bugfix
      - refactoring
    roles:                     # specialist subagents (./.claude/agents/)
      - software-architect
      - product-designer
      - researcher
      - backend-developer
      - frontend-developer
      - quality-engineer
      - devops-engineer

  - key: research-team
    title: Research Team
    status: available
    lead: project-manager     # kit settings.json sets agent:project-manager -> the session IS the PM
    summary: >
      Research / experimentation with an FZulG (German R&D tax credit) documentation layer.
      Runs the Research-Question -> Hypothesis/Experiment -> Task hierarchy: foreground PM +
      6 specialist subagents, producing per-experiment LaTeX reports plus fundable documentation.
    intents:
      - research
      - experiment
      - experimentation
      - study
      - hypothesis
      - investigation
      - science
      - grant
      - fzulg
      - r&d
      - rnd
    roles:                     # specialist subagents (./.claude/agents/)
      - methodologist
      - researcher
      - data-analyst
      - reviewer
      - research-engineer
      - report-writer

# Routing rule for the reader (the entry gate):
#   1. Classify the user's wish against each team's `intents` (substring/keyword match).
#   2. If exactly one team matches -> use it. If ambiguous -> ask ONE short routing question.
#   3. If the matched team's `status` != available -> say it is planned and offer an available one.
#   4. Default when only generic "build software" is plausible -> dev-team.
