# Team-kit registry — single source of truth for intent -> kit routing.
#
# Both the global entry gate (global/{claude,copilot}/CLAUDE.md / COPILOT.instructions.md)
# and the optional group-leader agent read this file to decide which team kit to install
# into a repository. Adding a new team type is one entry here — no prose edits elsewhere.
#
# The scaffold scripts (team-kits/scaffold_team.{ps1,sh}) install a kit by its `key`:
#   scaffold_team.ps1 -Team <key>   /   scaffold_team.sh <key>
# A kit is installable only if `status: available`.
#
# `lead: foreground` means: the PM is NOT a subagent. The main/foreground agent BECOMES the PM
# by following the installed local ./CLAUDE.md. `roles` lists the specialist SUBAGENTS only
# (the files under the kit's agents/, copied to ./.claude/agents/).

version: 1

teams:
  - key: dev-team
    title: Development Team
    status: available
    lead: foreground          # the main agent acts as PM via ./CLAUDE.md (no project-manager subagent)
    summary: >
      Software / product engineering: apps, APIs, tooling, libraries, build work.
      Runs the PRD -> SRD -> Task hierarchy: foreground PM + 5 specialist subagents.
    intents:
      - software
      - app
      - application
      - api
      - backend
      - frontend
      - website
      - tooling
      - cli
      - library
      - build
      - feature
      - bugfix
      - refactoring
    roles:                     # specialist subagents (./.claude/agents/)
      - software-architect
      - backend-developer
      - frontend-developer
      - quality-engineer
      - devops-engineer

  - key: research-team
    title: Research Team
    status: available
    lead: foreground          # the main agent acts as PM/Research Lead via ./CLAUDE.md
    summary: >
      Research / experimentation with an FZulG (German R&D tax credit) documentation layer.
      Runs the Research-Question -> Hypothesis/Experiment -> Task hierarchy: foreground PM +
      6 specialist subagents, producing per-experiment LaTeX reports plus fundable documentation.
    intents:
      - research
      - experiment
      - experimentation
      - study
      - hypothesis
      - investigation
      - science
      - grant
      - fzulg
      - r&d
      - rnd
    roles:                     # specialist subagents (./.claude/agents/)
      - methodologist
      - researcher
      - data-analyst
      - reviewer
      - research-engineer
      - report-writer

# Routing rule for the reader (gate / group-leader):
#   1. Classify the user's wish against each team's `intents` (substring/keyword match).
#   2. If exactly one team matches -> use it. If ambiguous -> ask ONE short routing question.
#   3. If the matched team's `status` != available -> say it is planned and offer an available one.
#   4. Default when only generic "build software" is plausible -> dev-team.
