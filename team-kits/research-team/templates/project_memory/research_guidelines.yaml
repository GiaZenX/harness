# research_guidelines.yaml — owned by: Methodologist · enforced by: Reviewer
# Hard boundaries for how research is done. A violation MUST block internal acceptance.
# Append-only: each rule is written once and stays. If a missing hard rule is noticed
# during work, whoever notices MUST flag it and the Methodologist appends it.
# The set only grows, never shrinks, and is not rewritten.

# Always applies, method-agnostic (shipped defaults):
global:
  - All code, comments, names and notes in English
  - Reproducibility first: record seeds, versions, environment for every run
  - Data provenance: record what/when/conditions/instrument for all raw data
  - Honest reporting: no p-hacking, no cherry-picking, no HARKing
  - Pre-register the analysis plan in the EXP design before collecting data
  - State and check statistical assumptions; report effect sizes + uncertainty, not just p-values
  - Never silently drop outliers — flag them for review
  - No secrets / no personal data in the repo
  # Enforced by TOOLS in the reproducibility pipeline (not only by review):
  - Analysis code auto-formatted + linted + type-checked (e.g. black/ruff/mypy); CI blocks on findings
  - Dependencies pinned (lockfile/env spec) and audited; environments are deterministic
  - License/data-usage compliance: datasets + dependencies carry an approved license; data use stays within its permitted scope

# Domain-critical method/tooling reference — the Methodologist MUST consider these per research domain
# (research-engineer with sources if unsure), so a critical method never gets "forgotten". REFERENCE ONLY.
method_tooling:
  ml_attention_architecture: ["seed pinning", "real training + eval run", "baseline comparison + ablation", "an eval harness / standard benchmark", "compute/runtime reporting"]
  statistics: ["correct test for the design", "power analysis", "multiple-comparison correction", "effect sizes + CIs"]
  human_studies: ["validated measurement instrument", "ethics/consent + data governance", "inter-rater reliability"]
  simulation: ["validated model + parameters", "convergence/sensitivity analysis", "seed/version pinning"]

# Per-method / per-domain rules. Starts EMPTY. The Methodologist adds a block the
# first time a method is actually used. Example shape:
#   statistics:
#     - "correct for multiple comparisons when > 1 test per hypothesis"
#   ml_experiments:
#     - "fixed train/val/test split; report seeds; no test-set tuning"
methods: {}

# Top-level source packages the deterministic checks SCAN (file budget, vitals).
# Defaults: src, frontend, scripts, tests, static, public. List every additional top-level
# package here — a real project kept its whole codebase under an unlisted package and the
# budget check was false-green for weeks. Entries EXTEND the defaults, never replace.
source_areas: []
#  - experiments
