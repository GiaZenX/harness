# progress.yaml — owned by: PM
# Holds the one-line project status and a metrics overview. The dashboard
# (progress.dashboard.html) is generated by generate_dashboard.py, which derives
# the actual counts and per-item lists directly from the RQ/task/PA files and
# uses the `status` line below for the dashboard header.

metrics:
  research_questions:
    proposed: 0
    approved: 0
    investigated: 0
    validated: 0
    accepted: 0
    rejected: 0
  tasks:
    todo: 0
    in_progress: 0
    done: 0
    validated: 0
  protocol_amendments:
    open: 0
    applied: 0

# Optional ROADMAP — group research questions (RQ ids) into milestones. The dashboard renders a
# roadmap view and computes each milestone's progress from the status of its items. Leave empty
# ([]) for a single-question effort; the PM fills it when the work spans several milestones.
milestones: []
#   - id: M1
#     title: "Baseline established"
#     target: 2026-07-15        # optional target date (YYYY-MM-DD)
#     items: [RQ-0001, RQ-0002] # the research-question ids this milestone covers

last_update: ""        # YYYY-MM-DD
status: ""             # one-line project status
