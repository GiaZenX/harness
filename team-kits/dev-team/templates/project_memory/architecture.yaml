# architecture.yaml — owned by: Architect
# Components, structure, data flow. MUST stay up to date — never stale.
#
# Schema:
#   components:
#     <name>:
#       responsibility: <what it does>
#       depends_on: [ <other components> ]
#       criticality: low | med | high          # how much a failure here hurts (drives test depth)
#       test_strategy: [ <which test types genuinely add value for THIS component> ]
#                                               # e.g. [unit], [unit, integration], [component, e2e-ui-smoke],
#                                               # [container-smoke], [real-run] — picked for value, NOT cargo-cult.
#                                               # QA reads this and proves each component is covered accordingly.
#   data_flow: <short description or diagram reference>
#   mermaid: |                       # component diagram as text (the Architect keeps it current).
#     graph TD                       # Renders in VS Code (Mermaid) and GitHub. Text -> diff-able,
#       API --> Service              # AI-maintainable. (Prefer Mermaid over draw.io for the live source.)
#       Service --> DB

components: {}
data_flow: ""
mermaid: |
  graph TD
    %% Architect: keep this component diagram in sync with `components` above.

# How the software is BUILT and SHIPPED — a CONSCIOUS decision, never implicit. Even "none (library only)"
# is a valid choice, but it MUST be stated. This is the deterministic guard against the "Docker was
# forgotten" failure mode: the architect decides packaging/deployment up front and records the rationale as
# an ADR in decisions.yaml. `gate_packaging_decision.py` blocks the merge while `method` is still TODO.
packaging:
  method: TODO        # static-binary | container | wheel | npm | installer | service-image | none(library) | ...
  targets: []         # e.g. [linux, windows, macos], or the deployment environment for a service
  how_to_run: ""      # how the user obtains and runs it (the build/install/deploy step)
  adr: ""             # the ADR id in decisions.yaml that argues this choice (e.g. ADR-0007)
