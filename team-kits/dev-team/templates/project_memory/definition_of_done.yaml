# definition_of_done.yaml — owned by: QA
# A task/PRD is only internally accepted when ALL of these hold. Shipped defaults.
# Philosophy: quality is enforced by TOOLS in the pipeline (deterministic), not by an agent
# reading the code. "Pipeline green" is a hard merge gate — QA only PASSES when every check is green.

# The quality pipeline (the DevOps role sets it up at project start; runs in CI + locally).
# Every stage must pass for a task to be DONE. Adapt the tools to the stack (see testing_guidelines).
# This is ENFORCED, not trusted: the merge gate `gate_pipeline.py` actually runs `scripts/quality.py`
# (the runner) and blocks the merge on a red result — a self-reported "result: pass" does not suffice.
pipeline:
  - format: code auto-formatted (e.g. prettier / black) — no diff
  - lint: linter clean (e.g. eslint / ruff) — no errors
  - types: static type check clean (e.g. tsc / mypy) — no errors
  - unit_tests: all green
  - integration_tests: all green (where applicable)
  - coverage: at or above the threshold in testing_guidelines.yaml
  - per_area_coverage: EACH top-level source area (src/, frontend/src/, …) meets the threshold on its own
  - component_coverage: every architecture.yaml component is tested with its prescribed test_strategy (no component untested)
  - real_run: user-/runtime-critical paths verified for real (not mock-only) with the DOMAIN's tools — e.g. UI smoke (Playwright) for web, real `docker build`+health for containers, Wokwi/HIL simulation for embedded, a real training/eval run for ML, a golden-file run for calculation. QA-verified per the domain ADR (decisions.yaml)
  - security_sast: SAST clean (bandit for python; per-stack equivalents) — high-severity finding is a FAIL
  - security_secrets: secret scan clean (gitleaks, run + hard-failed in CI) — no committed secret
  - dependencies: SCA audit clean (pip-audit / npm audit) — no known high/critical vulns; deps pinned
  - sbom: an SBOM is produced (cyclonedx) as a build artifact
  - licenses: DevOps reviews the SBOM's licenses against the project's allow-list (MANUAL step — not gate-enforced)
  - packaging: the build/ship method is a conscious decision — architecture.yaml `packaging.method` is set
      (not TODO) and argued in an ADR; gate-enforced by gate_packaging_decision.py (even "none/library" is valid)
  - bugfix_regression: a fix for a bugs.yaml BUG carries a regression test that FAILS pre-fix and PASSES
      post-fix (QA-verified, recorded in test_reports.yaml) before the bug may be VERIFIED
  # WHAT IS TOOL-ENFORCED vs VERIFIED — be honest:
  #  * EXECUTED by scripts/quality.py (gate_pipeline at merge + CI): format, lint, types, unit tests,
  #    GLOBAL coverage>=threshold, SAST, SCA, secret scan (gitleaks: hard in CI / warn-only locally), SBOM.
  #  * per_area_coverage: only partially backstopped by gate_test_coverage.py (src/ + frontend/, "area has
  #    zero tests"); NOT a per-stack %-gate.
  #  * component_coverage, real_run (UI smoke, real docker build/run, E2E) and the license review are
  #    QA/DevOps-VERIFIED, not yet tool-enforced — QA must confirm them and record it in the reports.
  #  A self-reported "result: pass" never satisfies the EXECUTED stages.

task_done:
  - Code follows coding_guidelines.yaml (global + relevant language)
  - "**Pipeline green**: every stage above passes (format, lint, types, tests, coverage, security, deps, licenses)"
  - Committed with a Conventional Commit message
  - Owned artifacts updated (tasks.yaml, architecture/decisions if touched)

prd_accepted:
  - All derived tasks VALIDATED
  - All acceptance_criteria met
  - QA review/test/acceptance reports green (pipeline green recorded)
  - Feature branch merged into main (internal acceptance)
