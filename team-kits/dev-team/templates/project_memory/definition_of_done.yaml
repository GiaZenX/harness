# definition_of_done.yaml — owned by: QA
# A task/PRD is only internally accepted when ALL of these hold. Shipped defaults.
# Philosophy: quality is enforced by TOOLS in the pipeline (deterministic), not by an agent
# reading the code. "Pipeline green" is a hard merge gate — QA only PASSES when every check is green.

# The quality pipeline (the DevOps role sets it up at project start; runs in CI + locally).
# Every stage must pass for a task to be DONE. Adapt the tools to the stack (see testing_guidelines).
# This is ENFORCED, not trusted: the merge gate `gate_pipeline.py` actually runs `scripts/quality.py`
# (the runner) and blocks the merge on a red result — a self-reported "result: pass" does not suffice.
pipeline:
  - format: code auto-formatted (e.g. prettier / black) — no diff
  - lint: linter clean (e.g. eslint / ruff) — no errors
  - types: static type check clean (e.g. tsc / mypy) — no errors
  - unit_tests: all green
  - integration_tests: all green (where applicable)
  - coverage: at or above the threshold in testing_guidelines.yaml
  - per_area_coverage: EACH top-level source area (src/, frontend/src/, …) meets the threshold on its own
  - component_coverage: every architecture.yaml component is tested with its prescribed test_strategy (no glied untested)
  - real_run: user-/runtime-critical paths verified for real, not mock-only (UI smoke e.g. Playwright; real `docker build` + health start; real end-to-end run for data/training)
  - security: SAST + secret scan clean — any high/critical finding is an automatic FAIL (no "reading past")
  - dependencies: dependency (SCA) audit clean (no known critical vulns); deps pinned in a lockfile
  - licenses: every dependency has an approved license (no disallowed/incompatible license without sign-off)

task_done:
  - Code follows coding_guidelines.yaml (global + relevant language)
  - "**Pipeline green**: every stage above passes (format, lint, types, tests, coverage, security, deps, licenses)"
  - Committed with a Conventional Commit message
  - Owned artifacts updated (tasks.yaml, architecture/decisions if touched)

prd_accepted:
  - All derived tasks VALIDATED
  - All acceptance_criteria met
  - QA review/test/acceptance reports green (pipeline green recorded)
  - Feature branch merged into main (internal acceptance)
