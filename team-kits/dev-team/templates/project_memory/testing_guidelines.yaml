# testing_guidelines.yaml — owned by: QA
# How tests must be written and what must be covered. Shipped defaults below.
# Append-only: QA fills the per-stack `languages:` block (mandatory, see below); never silently overwrite.
# QA owns test COMPLETENESS; the Architect provides the strategy input (component criticality +
# test_strategy in architecture.yaml, a test-approach ADR in decisions.yaml). See constitution §12a.

global:
  - Every task that changes behavior MUST have tests
  - Every fixed bug MUST get a regression test
  - Tests MUST be deterministic (no reliance on time, network, ordering)
  - Cover the happy path AND the relevant edge cases
  - Coverage MUST stay at or above the threshold below (CI fails below it)
  - "Per-area coverage: EACH top-level source area (src/, frontend/src/, ...) meets the threshold on its
    own — a high global number that a strong backend lifts over an untested frontend is NOT acceptable."
  - "No mock-only for user-/runtime-critical paths: a UI feature needs a real UI smoke (e.g. Playwright);
    a container needs a real `docker build` + health start; data/training needs a real end-to-end run."
  - Every component in architecture.yaml MUST be covered by the test type its `test_strategy` prescribes.
  - "Test-scoping ladder (the merge gate is the guarantee; intermediate runs are feedback): per edit/step
    run ONLY the affected tests + lint/types; per slice END run the full suite ONCE (QA's verdict run);
    merge/push always runs the FULL gate. Escalate to full immediately for cross-cutting changes (shared
    components, config, dependency bumps); a pre-push full run may be repeated once against flakiness.
    Running the full suite after every micro-step is redundant with the gate and forbidden."

# Coverage gate (hard). The architect/QA may raise it; never lower it silently.
coverage_gate:
  threshold: 80          # percent; CI fails below this
  scope: changed + core paths

# Default tooling matrix. The Architect/QA pick the concrete tools per project and
# may add/override per language under `languages`. These are recommendations, not law.
tooling_defaults:
  e2e_ui:
    recommended: Playwright
    alternatives: [Cypress]
  unit:
    javascript_typescript: [Vitest, Jest]
    python: [pytest]
    dotnet: [xUnit, NUnit]
    java: [JUnit]
    go: ["go test"]
  component_frontend:
    recommended: Testing Library   # e.g. React Testing Library
  api_integration:
    javascript_typescript: [supertest]
    python: ["pytest + httpx"]
    java: [REST-assured]
  static_quality:
    javascript_typescript: [ESLint, Prettier, tsc]
    python: [Ruff, Black, mypy]
  # Domain-critical tooling — the Architect MUST consider these per domain (research-engineer if unsure),
  # so a critical test never gets "forgotten". REFERENCE ONLY — not gate-enforced: to be checked, the
  # Architect declares the stack in project_config `stacks:` and DevOps wires the runner into
  # scripts/quality.py. (`playtest sign-off` below is a MANUAL gate, not automatable.) Extend per project.
  domain_tooling:
    embedded_firmware: ["PlatformIO unit tests", "Wokwi / renode simulation (real-run)", "cppcheck/clang-tidy", "cross-compile build"]
    accounting_finance: ["exact-decimal arithmetic", "property-based tests (rounding/ledger)", "audit/ledger trail", "regulatory checks (e.g. GoBD)"]
    games: ["asset-pipeline checks", "playtest sign-off", "frame-budget/perf", "logic unit tests"]
    calculation_cad: ["golden-file numerical regression", "tolerance/property tests", "mesh/convergence checks"]
    data_ml: ["real training/eval run", "dataset + seed pinning", "eval harness / drift checks"]
    web_services: ["e2e (Playwright)", "real container build + health smoke", "contract tests"]
  coverage:
    javascript_typescript: [c8, istanbul]
    python: ["coverage.py"]
  security:
    - npm audit
    - Trivy
    - Snyk
  load_perf:
    optional: [k6]   # omitting load/stress testing MUST be an explicit line in the test-approach ADR
                     # (like property/golden-file omissions) — a conscious decision, never silence

# UI CONSISTENCY ASSERTIONS (mandatory for UI-bearing projects — QA owns the tests, frontend keeps
# them green). Uniformity is MEASURABLE; "looks consistent" must be a green test, not an LLM
# judgment ("bearbeitet" claims without visible effect were a real failure class):
consistency_assertions:
  - "ONE heading scale: every view's top-level heading resolves to the SAME computed font-size
     (Playwright: getComputedStyle over all views — a real app had a different size per menu)."
  - "Cards/tiles in one row/grid have EQUAL bounding-box heights (compare boundingBox() of
     siblings; tolerance 1px — a real app shipped visibly unequal neighboring cards)."
  - "Spacing comes from the token scale ONLY (assert margins/paddings ∈ the design.yaml scale)."
  - "UI INVENTORY SNAPSHOT: the visible navigation items + primary actions per view are a snapshot
     test. Removing/replacing/renaming a visible element FAILS the snapshot — updating it requires
     an approved CR in the same change (a real run silently deleted the Account button)."

# Parallel execution (speed — a real project's SERIAL e2e suite ate 11+ minutes per verdict, repeated
# per fix round). QA/DevOps wire this; it changes nothing about WHAT is verified, only how fast:
parallel_execution:
  - "unit+integration: pytest-xdist (`-n auto`, shipped in requirements-dev — quality.py uses it
     automatically). Safe when tests avoid shared module state, fixed ports and shared files
     (per-test tmp_path / in-memory fixtures)."
  - "e2e (Playwright): NEVER naively parallel against ONE shared app instance — shared server state
     makes a flake factory. Parallel-safe pattern: `--dist loadfile` + one app instance PER worker
     (derive port/BASE_URL + data dir from PYTEST_XDIST_WORKER) + pin GPU/real-model tests to a
     single worker via `xdist_group`."
  - "container smoke stays SERIAL — it starts/stops the compose stack itself."
  - "any check that RECREATES the app container (compose up/recreate) MUST restore the previous
     serving state (e.g. a dev overlay) afterwards — a real gate step silently swapped the served UI
     back to an old image and the user tested a stale URL for hours."

# Per-stack specifics — QA MUST fill this for EVERY language/stack actually in use (not "on demand":
# leaving it empty for a used stack is the exact defect that shipped 0 frontend tests in a real run).
# Example shape:
#   typescript:
#     - "use vitest for unit/component; Playwright for the UI smoke; no skipped tests in main"
#   python:
#     - "pytest; httpx for API integration; a real end-to-end run for training/data paths"
languages: {}
