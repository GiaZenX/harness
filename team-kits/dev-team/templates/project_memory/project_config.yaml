# project_config.yaml — owned by: PM
# Created once at project init. Defines team preset, repo mode and the model map.
# The preset and any model change MUST be user-confirmed (see constitution §11).

project:
  name: ""                  # set at init
  preset: solo              # solo | duo | team
  repo_mode: greenfield     # greenfield | onboarded
  stacks: [TODO]            # REQUIRED — the architect declares the languages/stacks AND domain in use,
                            # e.g. [python, typescript, go, rust, dotnet, embedded, c, cpp]. The merge gate
                            # (scripts/quality.py) runs EACH declared stack's checks; a declared stack with
                            # no checks defined FAILs. Leaving it [TODO]/empty while code exists ALSO FAILs
                            # (no silent auto-detect) — so a critical tool can never be "forgotten".

# Model ladder: haiku < sonnet < opus. Specialists DEFAULT to sonnet (haiku failed the QA gate on
# complex code in a real run). Use haiku only for genuinely simple roles; escalate to opus for the hardest.
# Up-scaling needs user confirmation; down-scaling the PM MAY do itself but MUST report it with a reason
# (constitution §11). NEVER silent up-scaling, NEVER automatic.
#
# The PM is the FOREGROUND agent and runs on opus (kit .claude/settings.json + its own agent frontmatter;
# override per session via /model); it is NOT listed here. The keys below are the specialist SUBAGENTS — keys match
# the agent file/`name:` in ./.claude/agents/. The PM rewrites each agent's `model:` frontmatter
# to match this map (and verifies it) before delegating.
model_map:
  software-architect: sonnet
  product-designer: sonnet
  research-engineer: sonnet
  backend-developer: sonnet
  frontend-developer: sonnet
  quality-engineer: sonnet
  devops-engineer: sonnet

# Reasoning effort per specialist (low | medium | high | xhigh | max). Like model_map, the PM rewrites each
# specialist's `effort:` frontmatter to match this and verifies before delegating. DEFAULT: ALL specialists run
# `high` — on sonnet, `high` is the ceiling (xhigh/max are OPUS-ONLY). The PM (opus, session agent) runs `high`
# too, set in its own frontmatter (NOT here). ESCALATION (a stuck role, USER-confirmed, same trigger as the
# model escalation, §11): one combined ladder `sonnet-high -> opus-high -> opus-max` (xhigh = optional gentler
# middle: deep + persistent + capped). xhigh/max pay off most for the architect, reviewer/QA, or a dev stuck on
# a hard bug — never as a baseline. NEVER silent up-scaling.
effort_map:
  software-architect: high
  product-designer: high
  research-engineer: high
  backend-developer: high
  frontend-developer: high
  quality-engineer: high
  devops-engineer: high
