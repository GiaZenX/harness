# CI: the same deterministic quality pipeline the merge gate runs locally.
# It executes scripts/quality.py (ruff/mypy/pytest+coverage, eslint/tsc/tests, secret/dep scan).
name: quality
on:
  push:
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Python dev tooling
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: if [ -f frontend/package.json ]; then cd frontend && npm ci --legacy-peer-deps; fi
      - name: Run quality pipeline
        run: python scripts/quality.py
