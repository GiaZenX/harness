# CI for the agents-and-skills repo itself (dogfooding).
# Lints the Python we ship and runs the structural self-check (validate.py).
name: ci
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install tooling
        run: python -m pip install --upgrade pip ruff pyyaml
      - name: Lint shipped Python (hooks + scripts + tools)
        run: ruff check team-kits tools
      - name: Structural self-check
        run: python tools/validate.py
